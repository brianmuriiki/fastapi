<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎬 Movie Recommender</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    width: 420px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}
h1 {
    margin-bottom: 20px;
}
input {
    width: 80%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
}
button {
    padding: 12px 20px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #2563eb;
}
ul {
    list-style: none;
    padding: 0;
}
li {
    background: rgba(255,255,255,0.1);
    margin: 8px;
    padding: 12px;
    border-radius: 10px;
}
.score {
    font-size: 12px;
    color: #93c5fd;
}
.loader {
    display: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎬 Movie Recommender</h1>

    <input type="text" id="movieInput" placeholder="Enter a movie...">
    <br>
    <button onclick="getRecommendations()">Recommend</button>

    <div class="loader" id="loader">⏳ Finding movies...</div>

    <ul id="results"></ul>
</div>

<script>
async function getRecommendations() {
    const movie = document.getElementById("movieInput").value;
    const loader = document.getElementById("loader");
    const resultsList = document.getElementById("results");

    resultsList.innerHTML = "";
    loader.style.display = "block";

    try {
        const response = await fetch("http://127.0.0.1:8000/recommend", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ title: movie })
        });

        const data = await response.json();

        loader.style.display = "none";

        if (!data.recommendations || data.recommendations.length === 0) {
            resultsList.innerHTML = "<li>No recommendations found</li>";
            return;
        }

        data.recommendations.forEach(item => {
            const li = document.createElement("li");

            li.innerHTML = `
                🎥 ${item.title}
                <div class="score">Similarity: ${item.score.toFixed(3)}</div>
            `;

            resultsList.appendChild(li);
        });

    } catch (error) {
        loader.style.display = "none";
        alert("API connection failed");
    }
}
</script>

</body>
</html>
