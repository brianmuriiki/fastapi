<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spam Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #22c55e;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><>Spam Detector</h1>

    <textarea id="message" placeholder="Type your message here..."></textarea>
    
    <br>
    <button onclick="checkSpam()">Check</button>

    <div id="result"></div>
</div>

<script>
   async function checkSpam() {
    const resultEl = document.getElementById("result");
    const message = document.getElementById("message").value;

    //  Basic validation
    if (!message.trim()) {
        resultEl.innerText = "⚠️ Please enter a message";
        return;
    }

    //  Loading state
    resultEl.innerText = "Checking...";

    try {
        const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        });

        //  Handle HTTP errors
        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();

        //  Display result nicely
        const color = data.prediction === "Spam" ? "red" : "green";

        resultEl.innerHTML = `
            <span style="color:${color}; font-weight:bold;">
                ${data.prediction}
            </span>
            <br/>
            Confidence: ${data.confidence}%
        `;

    } catch (error) {
        console.error(error);
        resultEl.innerText = " Error connecting to API";
    }
}

</script>

</body>
</html>
